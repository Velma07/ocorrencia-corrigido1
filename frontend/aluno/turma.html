<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ALUNO - SISTEMA | Turmas</title>
    
    <link rel="icon" type="image/png" href="../assets/icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --success: #52b788;
            --danger: #e63946;
            --highlight: #ffff00;
            --bg: #f0f2f1;
            --text: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        .wrapper { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar { 
            width: 280px; 
            background: var(--primary); 
            color: white; 
            padding: 25px; 
            position: fixed; 
            height: 100%; 
            z-index: 100; 
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; text-align: center; color: var(--success); border-bottom: 1px solid var(--accent); padding-bottom: 15px; }
        
        .sidebar nav { 
            display: flex; 
            flex-direction: column; 
            height: calc(100% - 70px); 
            width: 100%;
        }
        .sidebar nav a { color: #b7e4c7; text-decoration: none; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: 0.3s; }
        .sidebar nav a:hover, .sidebar nav a.active { background: var(--success); color: white; }

        .sidebar .btn-sair {
            margin-top: auto; 
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-weight: bold;
        }
        .sidebar .btn-sair i { color: #ff7675; }
        .sidebar .btn-sair:hover { background: var(--danger); color: white; }
        .sidebar .btn-sair:hover i { color: white; }

        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; padding: 40px; }
        
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }

        /* Barra de Pesquisa */
        .search-container { position: relative; width: 300px; margin-bottom: 20px; }
        .search-container input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .search-container i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; }

        /* Tabela */
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 15px; background: #f8f9fa; color: var(--primary); font-size: 0.85rem; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95rem; color: var(--text); }
        .mark-highlight { background-color: var(--highlight); font-weight: bold; padding: 2px; }
        tr.hidden { display: none; }

        .numero-chamada {
            font-weight: bold;
            color: #718096;
            width: 30px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar">
            <h2>ALUNO</h2>
            <nav>
                <a href="turmas.html" class="active"><i class="fas fa-users"></i> Turmas</a>
                
                <a href="../index.html" class="btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header-actions">
                <h1 id="tituloTurma">Minha Turma</h1>
            </div>
            
            <div class="search-container">
                <input type="text" id="inputBusca" placeholder="Pesquisar colega de turma..." onkeyup="filtrarTabela()">
                <i class="fas fa-search"></i>
            </div>

            <div class="card">
                <table id="tabelaTurmas">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Nº</th>
                            <th>Nome do Aluno</th>
                            <th>Turma</th>
                            <th>Ano Letivo</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                        <tr>
                            <td colspan="4" style="text-align: center; color: #888; padding: 30px; font-style: italic;">
                                Carregando dados da lista de alunos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        /* OBJETO COMPLETO E ZERADO: O Back-end deve preencher estes campos dinamicamente */
        const dadosDaTurmaDoAluno = {
            "nomeTurma": "", // Nome principal que muda o título da página se necessário
            "alunos": [
                /* Exemplo de estrutura esperada do seu banco/back-end:
                { "nome": "NOME DO ALUNO", "turma": "3º ANO A - INFORMÁTICA", "anoLetivo": "2026" },
                */
            ]
        };

        function carregarTurma() {
            const titulo = document.getElementById('tituloTurma');
            const tabela = document.getElementById('corpoTabela');
            
            // Define o título do cabeçalho se o banco trouxer o nome dinâmico
            if (dadosDaTurmaDoAluno.nomeTurma && dadosDaTurmaDoAluno.nomeTurma.trim() !== "") {
                titulo.innerText = `Minha Turma: ${dadosDaTurmaDoAluno.nomeTurma}`;
            }

            let listaAlunos = dadosDaTurmaDoAluno.alunos || [];

            // Se o banco de dados não trouxer nenhum aluno cadastrado
            if (listaAlunos.length === 0) {
                tabela.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #888; padding: 30px; font-style: italic;">Nenhum registro localizado para esta turma.</td></tr>`;
                return;
            }

            // 1. Organiza a lista de alunos dinamicamente por Ordem Alfabética
            listaAlunos.sort((a, b) => a.nome.localeCompare(b.nome));

            tabela.innerHTML = "";

            // 2. Renderiza as linhas gerando o número da chamada (index + 1) e trazendo turma/ano letivo
            listaAlunos.forEach((aluno, index) => {
                const numeroChamada = index + 1;
                const novaLinha = document.createElement('tr');
                
                novaLinha.innerHTML = `
                    <td><span class="numero-chamada">${numeroChamada}</span></td>
                    <td class="nome-aluno" data-orig="${aluno.nome}">${aluno.nome}</td>
                    <td>${aluno.turma || '---'}</td>
                    <td>${aluno.anoLetivo || '---'}</td>
                `;
                tabela.appendChild(novaLinha);
            });
        }

        // Filtro de pesquisa dinâmica por nome do aluno
        function filtrarTabela() {
            const filter = document.getElementById('inputBusca').value.toLowerCase();
            const tr = document.querySelectorAll('#tabelaTurmas tbody tr');
            
            tr.forEach(linha => {
                const td = linha.querySelector('.nome-aluno');
                if (td) {
                    const textoOriginal = td.getAttribute('data-orig');
                    if (!textoOriginal) return;
                    
                    if (textoOriginal.toLowerCase().includes(filter)) {
                        linha.classList.remove('hidden');
                        if (filter !== "") {
                            const regex = new RegExp(`(${filter})`, 'gi');
                            td.innerHTML = textoOriginal.replace(regex, '<span class="mark-highlight">$1</span>');
                        } else { 
                            td.innerHTML = textoOriginal; 
                        }
                    } else { 
                        linha.classList.add('hidden'); 
                    }
                }
            });
        }

        // Inicializa as funções ao carregar a página
        window.onload = carregarTurma;
    </script>
</body>
</html>
