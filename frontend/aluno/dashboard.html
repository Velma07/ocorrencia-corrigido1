<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aluno</title>
<style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#064e3b,#10b981);
    padding:40px;
    overflow-x:hidden;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-120px;
    left:-120px;
    z-index:0;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(255,255,255,.05);
    border-radius:50%;
    bottom:-150px;
    right:-150px;
    z-index:0;
}

.dashboard{
    position:relative;
    z-index:1;
    max-width:1200px;
    margin:auto;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
    flex-wrap:wrap;
    gap:20px;
}

.header h1{color:#065f46;font-size:32px;}

.logout{background:#ef4444;color:white;border:none;padding:12px 24px;border-radius:10px;cursor:pointer;font-weight:bold;transition:.3s;}
.logout:hover{transform:translateY(-2px);background:#dc2626;}

.card{background:#f8fafc;border-radius:16px;padding:25px;margin-bottom:30px;box-shadow:0 10px 20px rgba(0,0,0,.08);}
.card h2{color:#047857;margin-bottom:20px;}

ul{list-style:none;}
li{background:white;padding:18px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);}

@media(max-width:768px){body{padding:20px;} .dashboard{padding:25px;} .header{flex-direction:column;align-items:flex-start;} li{flex-direction:column;align-items:flex-start;gap:15px;}}</style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>Aluno 🎓</h1>
        <button class="logout" onclick="logout()">Sair</button>
    </div>

    <div class="card">
        <h2>Minhas Ocorrências</h2>
        <ul id="lista"></ul>
    </div>
</div>

<script>
const API_BASE_URL = window.API_BASE_URL || "https://ocorrencia-corrigido1.onrender.com";

function apiUrl(path) {
    return `${API_BASE_URL}${path.startsWith("/") ? path : `/${path}`}`;
}

const token = localStorage.getItem("token");
const userId = localStorage.getItem("userId");
const nome = localStorage.getItem("nome");

if (!token) {
    window.location.href = "../login.html";
}

function carregar() {
    const url = userId
        ? apiUrl(`/ocorrencias/aluno/${userId}`)
        : apiUrl("/ocorrencias");

    fetch(url, {
        headers: { Authorization: token }
    })
    .then(res => res.json())
    .then(data => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!Array.isArray(data)) {
            lista.innerHTML = `<li>Erro: ${data.erro || 'Falha ao carregar ocorrências'}</li>`;
            return;
        }

        data.forEach(o => {
            const li = document.createElement("li");
            li.innerText = `${o.id} - ${o.descricao}`;
            lista.appendChild(li);
        });
    })
    .catch(() => {
        document.getElementById("lista").innerHTML = '<li>Erro ao conectar com o servidor.</li>';
    });
}

function logout() {
    localStorage.clear();
    window.location.href = "../login.html";
}

document.addEventListener("DOMContentLoaded", () => {
    if (nome) {
        const title = document.querySelector("h1");
        if (title) title.innerText = `Aluno 🎓 - ${nome}`;
    }
    carregar();
});
</script>

</body>
</html>
