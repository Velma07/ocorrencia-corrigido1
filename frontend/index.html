<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início | Sistema de Ocorrências</title>

    <link rel="icon" href="assets/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #064e3b, #10b981);
            padding: 20px;
            overflow: hidden; /* Evita barras de rolagem desnecessárias por conta das esferas do fundo */
        }

        /* FUNDO ORIGINAL */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            top: -100px;
            left: -100px;
        }

        body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            bottom: -120px;
            right: -120px;
        }

        .container {
            width: 100%;
            max-width: 950px;
            height: 520px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            z-index: 1;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .left {
            width: 50%;
            background: linear-gradient(135deg, #047857, #22c55e);
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left h1 {
            font-size: 34px;
            margin-bottom: 10px;
        }

        .left p {
            margin-bottom: 30px;
            font-size: 15px;
            opacity: 0.9;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .feature {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            transition: 0.3s;
        }

        .feature:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-3px);
        }

        .feature i {
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .right {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            background: #f3f4f6;
        }

        .right h2 {
            margin-bottom: 10px;
            font-size: 26px;
        }

        .right p {
            font-size: 14px;
            margin-bottom: 25px; /* Aumentado levemente para dar respiro sem o outro botão */
            color: #555;
        }

        .btn {
            width: 240px; /* Ajustado para dar um destaque melhor ao botão único */
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .login {
            background: linear-gradient(135deg, #047857, #16a34a);
            color: white;
            box-shadow: 0 5px 15px rgba(4, 120, 87, 0.3);
        }

        .login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(4, 120, 87, 0.4);
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            width: 100%;
            left: 0;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }

            .left, .right {
                width: 100%;
                padding: 40px 20px;
            }

            .left {
                text-align: center;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Sistema de Ocorrências</h1>
        <p>Gerencie registros escolares de forma simples, rápida e segura.</p>

        <div class="features">
            <div class="feature"><i class="fas fa-user-check"></i>Controle de alunos</div>
            <div class="feature"><i class="fas fa-file-alt"></i>Ocorrências</div>
            <div class="feature"><i class="fas fa-chart-bar"></i>Relatórios</div>
            <div class="feature"><i class="fas fa-shield-alt"></i>Segurança</div>
        </div>
    </div>

    <div class="right">
        <h2>Bem-vindo 👋</h2>
        <p>Acesse o sistema para registrar ou acompanhar ocorrências escolares.</p>
        <button class="btn login" onclick="entrar()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    </div>

</div>

<div class="footer">Sistema escolar • Desenvolvido para gestão de ocorrências</div>

<script>
function entrar() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
