<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - SISTEMA | Gerenciar Alunos</title>
    
    <link rel="icon" type="image/png" href="../assets/icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1b4332;
            --accent: #2d6a4f;
            --success: #52b788;
            --danger: #e63946;
            --highlight: #d8f3dc;
            --bg: #f0f2f1;
            --text: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        .wrapper { display: flex; min-height: 100vh; }

        /* Sidebar - Design Padronizado com Flexbox */
        .sidebar { 
            width: 280px; 
            background: var(--primary); 
            color: white; 
            padding: 25px; 
            position: fixed; 
            height: 100%; 
            transition: 0.3s; 
            z-index: 100; 
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { font-size: 1.4rem; margin-bottom: 30px; text-align: center; color: var(--success); border-bottom: 1px solid var(--accent); padding-bottom: 15px; }
        
        .sidebar nav { 
            display: flex; 
            flex-direction: column; 
            height: calc(100% - 70px); 
            width: 100%;
        }
        .sidebar nav a { color: #b7e4c7; text-decoration: none; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: 0.3s; cursor: pointer; }
        .sidebar nav a:hover, .sidebar nav a.active { background: var(--success); color: white; }

        /* Botão Sair customizado na parte inferior */
        .sidebar .btn-sair {
            margin-top: auto; 
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-weight: bold;
        }
        .sidebar .btn-sair i {
            color: #ff7675; 
        }
        .sidebar .btn-sair:hover {
            background: var(--danger); 
            color: white;
        }
        .sidebar .btn-sair:hover i {
            color: white;
        }

        /* Main Content */
        .main-content { flex: 1; margin-left: 280px; padding: 40px; }
        
        /* Cards e Estilização */
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h1 { margin-bottom: 20px; color: var(--primary); }
        
        /* Layout do Formulário em Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        
        label { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; background: white; }
        input:focus, select:focus { border-color: var(--success); }

        button.btn-add { background: var(--success); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        button.btn-add:hover { background: var(--accent); transform: scale(1.01); }

        /* Estilização dos Blocos de Turma (Accordion) */
        .turma-container { margin-bottom: 15px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        
        .turma-header { 
            background: #f8f9fa; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
            user-select: none;
            transition: background 0.2s;
        }
        .turma-header:hover { background: #f1f3f5; }
        .turma-title { font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .turma-badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }
        .turma-icon { transition: transform 0.3s; color: var(--accent); }
        
        .turma-content { display: none; padding: 10px 20px 20px 20px; background: white; border-top: 1px solid #eee; }
        
        /* Estado ativo do Accordion */
        .turma-container.active .turma-content { display: block; }
        .turma-container.active .turma-icon { transform: rotate(180deg); }

        /* Tabelas */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { text-align: left; padding: 12px 15px; background: #fff; color: var(--accent); font-size: 0.85rem; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .action-icons i { cursor: pointer; margin-right: 10px; transition: 0.2s; }
        .btn-edit { color: #f39c12; }
        .btn-edit:hover { opacity: 0.8; }
        .btn-delete { color: var(--danger); }
        .btn-delete:hover { opacity: 0.8; }

        /* TOAST */
        #toast {
            position: fixed; top: 30px; right: 30px; background: white; padding: 15px 25px; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 5px solid var(--success);
            display: none; align-items: center; gap: 15px; z-index: 2000; animation: toastIn 0.5s ease;
        }
        #toast.delete { border-left-color: var(--danger); }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* MODAL DE CONFIRMAÇÃO DE EXCLUSÃO */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: white; width: 400px; padding: 30px; border-radius: 15px; position: relative; animation: modalAnim 0.3s ease-out; text-align: center;}
        @keyframes modalAnim { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .form-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #eee; border: none; padding: 12px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-danger-confirm { background: var(--danger); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: bold; }

        /* Mensagem de lista vazia */
        .sem-alunos { color: #888; text-align: center; padding: 20px 0; font-size: 0.95rem; }

        /* Responsividade */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="toast">
        <div id="toastIcon" style="font-size: 1.2rem; color: var(--success);"><i class="fas fa-check"></i></div>
        <div>
            <strong id="toastTitle">Sucesso!</strong>
            <p id="toastMsg" style="font-size: 0.85rem; color: #666;"></p>
        </div>
    </div>

    <div class="wrapper">
        <aside class="sidebar">
            <h2>ADMIN</h2>
            <nav>
                <a href="alunos.html" class="active"><i class="fas fa-user-graduate"></i> Alunos</a>
                <a href="ocorrencias.html"><i class="fas fa-exclamation-triangle"></i> Ocorrências</a>
                <a href="turmas.html"><i class="fas fa-users"></i> Turmas</a>
                <a href="disciplinas.html"><i class="fas fa-book-open"></i> Disciplinas</a>
                <a href="professores.html"><i class="fas fa-chalkboard-teacher"></i> Professores</a>
                
                <a href="../index.html" class="btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Gerenciar Alunos</h1>
            
            <div class="card">
                <h3 id="formTitle" style="margin-bottom: 15px;">Novo Aluno</h3>
                <form id="formAluno">
                    
                    <input type="hidden" id="id_aluno" name="id_aluno">

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nome">Nome</label>
                            <input type="text" id="nome" name="nome_aluno" required>
                        </div>

                        <div class="form-group">
                            <label for="sobrenome">Sobrenome</label>
                            <input type="text" id="sobrenome" name="sobrenome_aluno" required>
                        </div>

                        <div class="form-group">
                            <label for="turma">Turma</label>
                            <select id="turma" name="id_turma" required>
                                <option value="">Selecione uma turma...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email_aluno" required>
                        </div>

                        <div class="form-group">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" name="senha_aluno" minlength="8" required>
                        </div>
                    </div>

                    <button type="submit" id="btnSalvar" class="btn-add">Cadastrar</button>
                </form>
            </div>

            <div class="card">
                <h3>Alunos no Sistema</h3>
                <div id="containerGruposTurmas" style="margin-top: 20px;">
                    <div class="sem-alunos" id="msgVazio">Nenhum aluno cadastrado no momento.</div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalDeleteAluno">
        <div class="modal-card">
            <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: var(--danger); margin-bottom: 15px;"></i>
            <h2>Tem certeza?</h2>
            <p style="color: #666; margin-bottom: 20px;">Você não poderá reverter esta ação!</p>
            <div class="form-buttons">
                <button class="btn-cancel" onclick="fecharModalDelete()">Cancelar</button>
                <button class="btn-danger-confirm" id="btnConfirmDeleteAluno">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <script>
        // Simulação inicial de turmas cadastradas para o campo <select>
        const turmasSimuladas = [
            { id: "t1", nome: "1º ANO A - ENSINO MÉDIO" },
            { id: "t2", nome: "2º ANO B - ENSINO MÉDIO" },
            { id: "t3", nome: "3º ANO A - ENSINO MÉDIO" }
        ];

        // Carrega as turmas no select ao iniciar a página
        const selectTurma = document.getElementById('turma');
        turmasSimuladas.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = t.nome;
            selectTurma.appendChild(opt);
        });

        const toast = document.getElementById('toast');
        const modalDel = document.getElementById('modalDeleteAluno');
        const formTitle = document.getElementById('formTitle');
        const btnSalvar = document.getElementById('btnSalvar');
        const formAluno = document.getElementById('formAluno');
        const containerGrupos = document.getElementById('containerGruposTurmas');
        const msgVazio = document.getElementById('msgVazio');

        let linhaParaAcao = null;

        function mostrarToast(titulo, msg, tipo = 'success') {
            toast.className = tipo === 'success' ? '' : 'delete';
            document.getElementById('toastIcon').innerHTML = tipo === 'success' ? '<i class="fas fa-check"></i>' : '<i class="fas fa-trash"></i>';
            document.getElementById('toastTitle').innerText = titulo;
            document.getElementById('toastMsg').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function alternarTurma(header) {
            const container = header.parentElement;
            container.classList.toggle('active');
        }

        function fecharModalDelete() {
            modalDel.style.display = 'none';
        }

        function abrirConfirmacaoExclusao(btn) {
            linhaParaAcao = btn.closest('tr');
            modalDel.style.display = 'flex';
        }

        // Função crucial pedida: Reorganiza as linhas de uma tabela por Ordem Alfabética (Baseado no Nome completo)
        function ordenarTabelaAlfabeticamente(tbody) {
            const linhas = Array.from(tbody.querySelectorAll('tr'));
            
            linhas.sort((a, b) => {
                const nomeA = a.querySelector('.col-nome').textContent.trim().toLowerCase();
                const nomeB = b.querySelector('.col-nome').textContent.trim().toLowerCase();
                return nomeA.localeCompare(nomeB, 'pt-BR');
            });

            // Re-insere as linhas ordenadas de volta na tabela
            linhas.forEach(linha => tbody.appendChild(linha));
        }

        // Atualiza os contadores das badges e remove turmas vazias se necessário
        function atualizarInterfaceGeral() {
            const blocos = containerGrupos.querySelectorAll('.turma-container');
            let totalAlunos = 0;

            blocos.forEach(bloco => {
                const tbody = bloco.querySelector('tbody');
                const qtd = tbody.querySelectorAll('tr').length;
                
                if (qtd === 0) {
                    bloco.remove();
                } else {
                    bloco.querySelector('.turma-badge').textContent = `${qtd} Aluno(s)`;
                    totalAlunos += qtd;
                }
            });

            if (containerGrupos.querySelectorAll('.turma-container').length === 0) {
                msgVazio.style.display = 'block';
            } else {
                msgVazio.style.display = 'none';
            }
        }

        // Intercepta e processa o envio do formulário (Inserção e Edição Simulada)
        formAluno.addEventListener('submit', function(e) {
            e.preventDefault();

            const idAluno = document.getElementById('id_aluno').value;
            const nome = document.getElementById('nome').value.trim();
            const sobrenome = document.getElementById('sobrenome').value.trim();
            const idTurmaSelect = selectTurma.value;
            const textoTurmaSelect = selectTurma.options[selectTurma.selectedIndex].text;
            const email = document.getElementById('email').value.trim();

            if (idAluno) {
                // Modo Edição: Localiza a linha antiga pela ID guardada no atributo data-id
                const linhaAntiga = containerGrupos.querySelector(`tr[data-id="${idAluno}"]`);
                const tbodyAntigo = linhaAntiga.closest('tbody');

                // Verifica se mudou de turma
                const containerDestinoId = `bloco-${idTurmaSelect}`;
                let containerDestino = document.getElementById(containerDestinoId);

                if (!containerDestino) {
                    containerDestino = criarNovoBlocoTurma(idTurmaSelect, textoTurmaSelect);
                }

                const tbodyDestino = containerDestino.querySelector('tbody');

                // Atualiza os dados na linha
                linhaAntiga.querySelector('.col-nome').textContent = `${nome} ${sobrenome}`;
                linhaAntiga.querySelector('.col-email').textContent = email;
                linhaAntiga.setAttribute('data-nome-puro', nome);
                linhaAntiga.setAttribute('data-sobrenome-puro', sobrenome);

                // Se trocou de turma, move o elemento tr para o novo bloco
                if (tbodyAntigo !== tbodyDestino) {
                    tbodyDestino.appendChild(linhaAntiga);
                }

                ordenarTabelaAlfabeticamente(tbodyDestino);
                mostrarToast("Atualizado!", "Dados do aluno atualizados com sucesso.");
            } else {
                // Modo Cadastro: Cria uma ID aleatória fictícia
                const novaId = 'aluno_' + Math.random().toString(36).substr(2, 9);
                
                // Encontra ou cria o bloco sanfonado da turma correspondente
                const containerId = `bloco-${idTurmaSelect}`;
                let containerTurma = document.getElementById(containerId);

                if (!containerTurma) {
                    containerTurma = criarNovoBlocoTurma(idTurmaSelect, textoTurmaSelect);
                }

                const tbody = containerTurma.querySelector('tbody');

                // Cria o elemento da linha com atributos auxiliares de edição
                const tr = document.createElement('tr');
                tr.setAttribute('data-id', novaId);
                tr.setAttribute('data-nome-puro', nome);
                tr.setAttribute('data-sobrenome-puro', sobrenome);
                tr.setAttribute('data-turma-id', idTurmaSelect);
                tr.innerHTML = `
                    <td class="col-nome">${nome} ${sobrenome}</td>
                    <td class="col-email">${email}</td>
                    <td class="action-icons">
                        <i class="fas fa-edit btn-edit" onclick="prepararEdicaoSimulada(this)"></i>
                        <i class="fas fa-trash btn-delete" onclick="abrirConfirmacaoExclusao(this)"></i>
                    </td>
                `;

                tbody.appendChild(tr);
                ordenarTabelaAlfabeticamente(tbody);
                mostrarToast("Sucesso!", "Aluno cadastrado e ordenado na lista.");
            }

            // Reseta o formulário e o estado visual do painel
            formAluno.reset();
            document.getElementById('id_aluno').value = '';
            document.getElementById('senha').setAttribute('required', 'required');
            formTitle.innerText = "Novo Aluno";
            btnSalvar.innerText = "Cadastrar";

            atualizarInterfaceGeral();
        });

        // Constrói dinamicamente a estrutura de um Bloco/Accordion de Turma caso não exista na árvore
        function criarNovoBlocoTurma(idTurma, nomeTurma) {
            const div = document.createElement('div');
            div.className = 'turma-container active'; // Inicia aberto
            div.id = `bloco-${idTurma}`;
            div.innerHTML = `
                <div class="turma-header" onclick="alternarTurma(this)">
                    <div class="turma-title">
                        <i class="fas fa-graduation-cap"></i>
                        <span>${nomeTurma}</span>
                    </div>
                    <div>
                        <span class="turma-badge">0 Aluno(s)</span>
                        <i class="fas fa-chevron-down turma-icon" style="margin-left: 10px;"></i>
                    </div>
                </div>
                <div class="turma-content">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome Completo</th>
                                <th>E-mail</th>
                                <th style="width: 100px;">Ações</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            `;
            containerGrupos.appendChild(div);
            return div;
        }

        // Puxa as propriedades guardadas nos atributos customizados para os campos do formulário superior
        function prepararEdicaoSimulada(btn) {
            const tr = btn.closest('tr');
            
            const id = tr.getAttribute('data-id');
            const nome = tr.getAttribute('data-nome-puro');
            const sobrenome = tr.getAttribute('data-sobrenome-puro');
            const idTurma = tr.getAttribute('data-turma-id');
            const email = tr.querySelector('.col-email').textContent;

            document.getElementById('id_aluno').value = id;
            document.getElementById('nome').value = nome;
            document.getElementById('sobrenome').value = sobrenome;
            document.getElementById('turma').value = idTurma;
            document.getElementById('email').value = email;
            
            document.getElementById('senha').removeAttribute('required');

            formTitle.innerText = "Editar Aluno";
            btnSalvar.innerText = "Atualizar";
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Confirmação de remoção da linha
        document.getElementById('btnConfirmDeleteAluno').onclick = function() {
            if (linhaParaAcao) {
                const tbodyAlvo = linhaParaAcao.closest('tbody');
                linhaParaAcao.remove();
                fecharModalDelete();
                mostrarToast("Excluído!", "O aluno foi removido.", "error");
                atualizarInterfaceGeral();
                linhaParaAcao = null;
            }
        };
    </script>
</body>
</html>
